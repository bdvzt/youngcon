name: YoungCon iOS CI/CD

on:
  push:
    branches:
      - main
      - develop
      - 'release/**'
      - 'feature/**'
      - 'hotfix/**'
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PROJECT: YoungCon/YoungCon.xcodeproj
  SCHEME: YoungCon
  XCODE_VERSION: "26.1.1"
  IOS_DEPLOYMENT_TARGET: "17.0"
  DESTINATION: "platform=iOS Simulator,name=iPhone 16 Pro,OS=latest"
  DERIVED_DATA: DerivedData
  ARTIFACTS_DIR: build_artifacts

jobs:

  lint:
    name: "Lint (SwiftLint + SwiftFormat)"
    runs-on: macos-15
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode ${{ env.XCODE_VERSION }}
        run: |
          sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app/Contents/Developer
          xcodebuild -version

      - name: Install SwiftLint
        run: |
          if ! command -v swiftlint &> /dev/null; then
            brew install swiftlint
          fi
          swiftlint version

      - name: Install SwiftFormat
        run: |
          if ! command -v swiftformat &> /dev/null; then
            brew install swiftformat
          fi
          swiftformat --version

      - name: Run SwiftLint
        run: |
          swiftlint lint \
            --reporter github-actions-logging \
            --strict \
            --config .swiftlint.yml

      - name: Run SwiftFormat (check only)
        run: |
          swiftformat . \
            --lint \
            --config .swiftformat \
            --swiftversion 6.0

  build:
    name: "Build (Debug)"
    runs-on: macos-15
    needs: lint
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode ${{ env.XCODE_VERSION }}
        run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app/Contents/Developer

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ${{ env.DERIVED_DATA }}
          key: derived-data-${{ runner.os }}-${{ env.XCODE_VERSION }}-${{ hashFiles('**/*.xcodeproj/**', '**/*.swift', '**/Package.resolved') }}
          restore-keys: |
            derived-data-${{ runner.os }}-${{ env.XCODE_VERSION }}-

      - name: Resolve Swift Package Dependencies
        run: |
          xcodebuild \
            -resolvePackageDependencies \
            -project ${{ env.PROJECT }} \
            -scheme ${{ env.SCHEME }} \
            -derivedDataPath ${{ env.DERIVED_DATA }}

      - name: Build (Debug)
        run: |
          set -o pipefail
          xcodebuild build \
            -project ${{ env.PROJECT }} \
            -scheme ${{ env.SCHEME }} \
            -destination "${{ env.DESTINATION }}" \
            -configuration Debug \
            -derivedDataPath ${{ env.DERIVED_DATA }} \
            IPHONEOS_DEPLOYMENT_TARGET=${{ env.IOS_DEPLOYMENT_TARGET }} \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            | xcbeautify --renderer github-actions

      - name: Upload DerivedData (for tests)
        uses: actions/upload-artifact@v4
        with:
          name: derived-data
          path: ${{ env.DERIVED_DATA }}
          retention-days: 1

  unit-tests:
    name: "Unit Tests"
    runs-on: macos-15
    needs: build
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode ${{ env.XCODE_VERSION }}
        run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app/Contents/Developer

      - name: Download DerivedData
        uses: actions/download-artifact@v4
        with:
          name: derived-data
          path: ${{ env.DERIVED_DATA }}

      - name: Boot Simulator
        run: |
          UDID=$(xcrun simctl list devices available \
            | grep "iPhone 16 Pro" \
            | head -1 \
            | grep -oE '[A-F0-9-]{36}')
          echo "SIMULATOR_UDID=$UDID" >> $GITHUB_ENV
          xcrun simctl boot "$UDID" || true
          xcrun simctl bootstatus "$UDID" -b

      - name: Run Unit Tests
        run: |
          set -o pipefail
          mkdir -p ${{ env.ARTIFACTS_DIR }}
          xcodebuild test \
            -project ${{ env.PROJECT }} \
            -scheme ${{ env.SCHEME }} \
            -destination "id=${{ env.SIMULATOR_UDID }}" \
            -derivedDataPath ${{ env.DERIVED_DATA }} \
            -configuration Debug \
            -testPlan UnitTests \
            -resultBundlePath ${{ env.ARTIFACTS_DIR }}/UnitTests.xcresult \
            -enableCodeCoverage YES \
            IPHONEOS_DEPLOYMENT_TARGET=${{ env.IOS_DEPLOYMENT_TARGET }} \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify --renderer github-actions

      - name: Export Code Coverage
        run: |
          xcrun xccov view \
            --report \
            --json ${{ env.ARTIFACTS_DIR }}/UnitTests.xcresult \
            > ${{ env.ARTIFACTS_DIR }}/coverage.json
          python3 -c "
          import json, sys
          with open('${{ env.ARTIFACTS_DIR }}/coverage.json') as f:
              data = json.load(f)
          cov = data.get('lineCoverage', 0) * 100
          print(f' Code Coverage: {cov:.2f}%')
          if cov < 60:
              print('  Coverage below 60% threshold')
              sys.exit(1)
          "

      - name: Upload Unit Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: ${{ env.ARTIFACTS_DIR }}/UnitTests.xcresult
          retention-days: 7

  ui-tests:
    name: "UI Tests"
    runs-on: macos-15
    needs: build
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode ${{ env.XCODE_VERSION }}
        run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app/Contents/Developer

      - name: Download DerivedData
        uses: actions/download-artifact@v4
        with:
          name: derived-data
          path: ${{ env.DERIVED_DATA }}

      - name: Boot Simulator
        run: |
          UDID=$(xcrun simctl list devices available \
            | grep "iPhone 16 Pro" \
            | head -1 \
            | grep -oE '[A-F0-9-]{36}')
          echo "SIMULATOR_UDID=$UDID" >> $GITHUB_ENV
          xcrun simctl boot "$UDID" || true
          xcrun simctl bootstatus "$UDID" -b

      - name: Run UI Tests
        run: |
          set -o pipefail
          mkdir -p ${{ env.ARTIFACTS_DIR }}
          xcodebuild test \
            -project ${{ env.PROJECT }} \
            -scheme ${{ env.SCHEME }} \
            -destination "id=${{ env.SIMULATOR_UDID }}" \
            -derivedDataPath ${{ env.DERIVED_DATA }} \
            -configuration Debug \
            -testPlan UITests \
            -resultBundlePath ${{ env.ARTIFACTS_DIR }}/UITests.xcresult \
            IPHONEOS_DEPLOYMENT_TARGET=${{ env.IOS_DEPLOYMENT_TARGET }} \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify --renderer github-actions

      - name: Capture Simulator Logs on Failure
        if: failure()
        run: |
          xcrun simctl spawn booted log collect \
            --output ${{ env.ARTIFACTS_DIR }}/simulator.logarchive || true

      - name: Upload UI Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ui-test-results
          path: ${{ env.ARTIFACTS_DIR }}/UITests.xcresult
          retention-days: 7

  notify:
    name: "Pipeline Summary"
    runs-on: ubuntu-latest
    needs: [lint, build, unit-tests, ui-tests]
    if: always()

    steps:
      - name: Report Status
        run: |
          echo "## YoungCon CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.unit-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| UI Tests | ${{ needs.ui-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY

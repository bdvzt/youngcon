name: YoungCon iOS CI/CD

on:
  push:
    branches:
      - main
      - develop
      - 'release/**'
      - 'feature/**'
      - 'hotfix/**'
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  WORKSPACE: YoungCon.xcworkspace
  SCHEME: YoungCon
  TUIST_PATH: .
  XCODE_VERSION: "26.1.1"
  IOS_DEPLOYMENT_TARGET: "17.0"
  DESTINATION: "platform=iOS Simulator,name=iPhone 16 Pro,OS=17"
  DERIVED_DATA: DerivedData
  ARTIFACTS_DIR: build_artifacts

jobs:

  lint:
    name: "Lint (SwiftLint + SwiftFormat)"
    runs-on: macos-15
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode ${{ env.XCODE_VERSION }}
        run: |
          sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app/Contents/Developer
          xcodebuild -version

      - name: Install SwiftLint
        run: |
          if ! command -v swiftlint &> /dev/null; then
            brew install swiftlint
          fi
          swiftlint version

      - name: Install SwiftFormat
        run: |
          if ! command -v swiftformat &> /dev/null; then
            brew install swiftformat
          fi
          swiftformat --version

      - name: Run SwiftLint
        run: |
          swiftlint lint \
            --reporter github-actions-logging \
            --strict \
            --config .swiftlint.yml

      - name: Run SwiftFormat (check only)
        run: |
           swiftformat . \
            --lint \
            --swiftversion 6.0 \
            --indent 4 \
            --linebreaks lf \
            --semicolons never \
            --trailingcommas always \
            --importgrouping alphabetized \
            --exclude "Tuist,Project.swift,Tuist.swift,**/Project.swift,**/Tuist.swift,YoungCon/YoungCon.xcodeproj,YoungConTests/YoungConTests.swift,YoungConUITests/YoungConUITests.swift,YoungConUITests/YoungConUITestsLaunchTests.swift" \
            --wrapmultiline none

  build:
    name: "Build (Debug)"
    runs-on: macos-15
    needs: lint
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode ${{ env.XCODE_VERSION }}
        run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app/Contents/Developer

      - name: Install Tuist
        run: |
          if ! command -v tuist &> /dev/null; then
            brew install tuist
          fi
          tuist version

      - name: Install Tuist Dependencies
        run: tuist install --path "${{ env.TUIST_PATH }}"

      - name: Generate Xcode Project
        run: tuist generate --path "${{ env.TUIST_PATH }}" --no-open

      - name: Debug generated files
        run: |
          echo "=== Generated .xcodeproj and .xcworkspace ==="
          find . -maxdepth 4 \( -name "*.xcodeproj" -o -name "*.xcworkspace" \) | sort
          echo "=== Checking project.pbxproj ==="
          find . -maxdepth 6 -name "project.pbxproj" | sort

      - name: Install xcbeautify
        run: |
          if ! command -v xcbeautify &> /dev/null; then
            brew install xcbeautify
          fi
          xcbeautify --version

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ${{ env.DERIVED_DATA }}
          key: derived-data-${{ runner.os }}-${{ env.XCODE_VERSION }}-${{ hashFiles('**/*.swift', 'Project.swift', 'Tuist.swift', '**/Package.resolved') }}
          restore-keys: |
            derived-data-${{ runner.os }}-${{ env.XCODE_VERSION }}-

      - name: Build (Debug)
        run: |
          set -o pipefail
          xcodebuild build \
            -workspace "${{ env.WORKSPACE }}" \
            -scheme "${{ env.SCHEME }}" \
            -destination "${{ env.DESTINATION }}" \
            -configuration Debug \
            -derivedDataPath "${{ env.DERIVED_DATA }}" \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=YES \
            | xcbeautify --renderer github-actions

      - name: Upload DerivedData (for tests)
        uses: actions/upload-artifact@v4
        with:
          name: derived-data
          path: ${{ env.DERIVED_DATA }}
          retention-days: 1

  unit-tests:
    name: "Unit Tests"
    runs-on: macos-15
    needs: build
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode ${{ env.XCODE_VERSION }}
        run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app/Contents/Developer

      - name: Install Tuist
        run: |
          if ! command -v tuist &> /dev/null; then
            brew install tuist
          fi
          tuist version

      - name: Install Tuist Dependencies
        run: tuist install --path "${{ env.TUIST_PATH }}"

      - name: Generate Xcode Project
        run: tuist generate --path "${{ env.TUIST_PATH }}" --no-open

      - name: Install xcbeautify
        run: |
          if ! command -v xcbeautify &> /dev/null; then
            brew install xcbeautify
          fi

      - name: Download DerivedData
        uses: actions/download-artifact@v4
        with:
          name: derived-data
          path: ${{ env.DERIVED_DATA }}

      - name: Run Unit Tests
        run: |
          set -o pipefail
          mkdir -p "${{ env.ARTIFACTS_DIR }}"
          xcodebuild test \
            -workspace "${{ env.WORKSPACE }}" \
            -scheme "${{ env.SCHEME }}" \
            -destination "${{ env.DESTINATION }}" \
            -derivedDataPath "${{ env.DERIVED_DATA }}" \
            -configuration Debug \
            -only-testing:YoungConTests \
            -resultBundlePath "${{ env.ARTIFACTS_DIR }}/UnitTests.xcresult" \
            -enableCodeCoverage YES \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify --renderer github-actions

      - name: Upload Unit Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: ${{ env.ARTIFACTS_DIR }}/UnitTests.xcresult
          retention-days: 7

  ui-tests:
    name: "UI Tests"
    runs-on: macos-15
    needs: build
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode ${{ env.XCODE_VERSION }}
        run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app/Contents/Developer

      - name: Install Tuist
        run: |
          if ! command -v tuist &> /dev/null; then
            brew install tuist
          fi
          tuist version

      - name: Install Tuist Dependencies
        run: tuist install --path "${{ env.TUIST_PATH }}"

      - name: Generate Xcode Project
        run: tuist generate --path "${{ env.TUIST_PATH }}" --no-open

      - name: Install xcbeautify
        run: |
          if ! command -v xcbeautify &> /dev/null; then
            brew install xcbeautify
          fi

      - name: Download DerivedData
        uses: actions/download-artifact@v4
        with:
          name: derived-data
          path: ${{ env.DERIVED_DATA }}

      - name: Run UI Tests
        run: |
          set -o pipefail
          mkdir -p "${{ env.ARTIFACTS_DIR }}"
          xcodebuild test \
            -workspace "${{ env.WORKSPACE }}" \
            -scheme "${{ env.SCHEME }}" \
            -destination "${{ env.DESTINATION }}" \
            -derivedDataPath "${{ env.DERIVED_DATA }}" \
            -configuration Debug \
            -only-testing:YoungConUITests \
            -resultBundlePath "${{ env.ARTIFACTS_DIR }}/UITests.xcresult" \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify --renderer github-actions

      - name: Capture Simulator Logs on Failure
        if: failure()
        run: |
          xcrun simctl spawn booted log collect \
            --output "${{ env.ARTIFACTS_DIR }}/simulator.logarchive" || true

      - name: Upload UI Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ui-test-results
          path: ${{ env.ARTIFACTS_DIR }}/UITests.xcresult
          retention-days: 7

  notify:
    name: "Pipeline Summary"
    runs-on: ubuntu-latest
    needs: [lint, build, unit-tests, ui-tests]
    if: always()

    steps:
      - name: Report Status
        run: |
          echo "## YoungCon CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.unit-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| UI Tests | ${{ needs.ui-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
